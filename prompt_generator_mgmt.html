<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>퀴즈 데이터 추출 프롬프트 생성기 — 경영학</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --surface: #faf7f2;
  --surface2: #ede8df;
  --border: #d4cfc5;
  --border2: #bfb9ae;
  --text: #1a1714;
  --dim: #6b6560;
  --muted: #a09b94;
  --accent: #b5430a;
  --accent2: #1a6b4a;
  --r: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  line-height: 1.75;
  min-height: 100vh;
  padding-bottom: 80px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,130,0.07) 28px, rgba(180,160,130,0.07) 29px);
  pointer-events: none; z-index: 0;
}
.header {
  background: var(--text);
  padding: 0 32px;
  position: sticky; top: 0; z-index: 100;
  border-bottom: 3px solid var(--accent);
}
.header-inner {
  max-width: 820px; margin: 0 auto;
  display: flex; align-items: stretch;
  height: 56px;
}
.logo-block {
  display: flex; align-items: center; gap: 14px;
  padding-right: 24px;
  border-right: 1px solid rgba(255,255,255,0.12);
}
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 900;
  font-family: 'Syne', sans-serif;
}
.logo-text {
  font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700;
  color: #f5f0e8; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.logo-sub {
  margin-left: 20px;
  display: flex; align-items: center;
  font-size: 11px; color: rgba(245,240,232,0.45);
  font-family: 'DM Mono', monospace;
}
.main {
  max-width: 820px; margin: 0 auto;
  padding: 36px 32px 0;
  position: relative; z-index: 1;
}
.page-title {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-end; justify-content: space-between;
}
.page-title h1 {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px; font-weight: 900;
  color: var(--text); letter-spacing: -0.5px; line-height: 1.2;
}
.page-title h1 span {
  display: block;
  font-size: 12px; font-weight: 400;
  color: var(--muted); letter-spacing: 1px;
  font-family: 'DM Mono', monospace;
  text-transform: uppercase; margin-bottom: 4px;
}
.page-badge {
  background: var(--accent);
  color: #fff; font-size: 10px;
  font-family: 'Syne', sans-serif;
  font-weight: 700; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 4px 10px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--border2);
  border-radius: var(--r);
  padding: 24px 26px; margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700;
  color: var(--accent); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-family: 'Syne', sans-serif;
  font-size: 10.5px; font-weight: 700;
  color: var(--dim); margin-bottom: 6px;
  letter-spacing: 1px; text-transform: uppercase;
}
.field input, .field select {
  width: 100%; background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--text);
  font-family: 'Noto Serif KR', serif;
  font-size: 13px; padding: 9px 12px;
  outline: none; transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(181,67,10,0.08);
}
.field input::placeholder { color: var(--muted); font-style: italic; }
.field select { cursor: pointer; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.hint { font-size: 10.5px; color: var(--muted); margin-top: 5px; font-family: 'DM Mono', monospace; }
.hint.green { color: var(--accent2); font-weight: 500; }
.divider { height: 1px; background: var(--border); margin: 18px 0; }
.gen-btn {
  width: 100%; background: var(--text);
  border: none; border-radius: var(--r); color: var(--bg);
  cursor: pointer; font-family: 'Syne', sans-serif;
  font-size: 13px; font-weight: 700; padding: 15px;
  letter-spacing: 2px; text-transform: uppercase;
  transition: all .18s; margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.gen-btn::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 3px; background: var(--accent);
  transition: width .25s;
}
.gen-btn:hover::after { width: 100%; }
.gen-btn:hover { background: #2c2826; }
.gen-btn:active { transform: scale(0.99); }
.output-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
}
.output-label {
  font-family: 'Syne', sans-serif;
  font-size: 10px; font-weight: 700;
  color: var(--dim); letter-spacing: 2px; text-transform: uppercase;
}
.copy-btn {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--r); color: var(--dim); cursor: pointer;
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  padding: 5px 13px; letter-spacing: 1px; text-transform: uppercase;
  transition: all .15s;
}
.copy-btn:hover { border-color: var(--accent); color: var(--accent); }
.copy-btn.copied { border-color: var(--accent2); color: var(--accent2); }
.empty-state {
  text-align: center; padding: 52px 20px;
  color: var(--muted); font-size: 13px;
  border: 1.5px dashed var(--border); border-radius: var(--r);
  background: var(--surface); font-family: 'DM Mono', monospace;
}
.empty-state .icon { font-size: 30px; margin-bottom: 10px; }
.empty-state p { font-style: italic; }
.output-box {
  background: var(--text); border-radius: var(--r);
  padding: 22px 24px; font-family: 'DM Mono', monospace;
  font-size: 11.5px; line-height: 1.9; color: #d4cfc5;
  white-space: pre-wrap; word-break: break-word;
  max-height: 540px; overflow-y: auto; display: none;
  border-left: 3px solid var(--accent);
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.output-box::-webkit-scrollbar { width: 4px; }
.output-box::-webkit-scrollbar-track { background: transparent; }
.output-box::-webkit-scrollbar-thumb { background: #3a3530; border-radius: 2px; }
.output-box.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-block">
      <div class="logo-icon">경</div>
      <div class="logo-text">Prompt Gen</div>
    </div>
    <div class="logo-sub">경영학 퀴즈 데이터 추출용</div>
  </div>
</div>

<div class="main">

  <div class="page-title">
    <h1>
      <span>Quiz Data Extractor</span>
      프롬프트 생성기
    </h1>
    <div class="page-badge">경영학</div>
  </div>

  <div class="card">
    <div class="card-title">단원 정보 입력</div>

    <div class="grid2">
      <div class="field">
        <label>단원명</label>
        <input type="text" id="unitName" placeholder="예: 경영전략">
      </div>
      <div class="field">
        <label>대단원</label>
        <select id="parentId" onchange="updatePrefix()">
          <option value="A">A — 경영학 기초개념</option>
          <option value="B">B — 경영자와 기업</option>
          <option value="C">C — 경영관리</option>
          <option value="D">D — 경영전략</option>
          <option value="E">E — 조직행동론 기초개념</option>
          <option value="F">F — 개인수준 활동</option>
          <option value="G">G — 집단수준 활동</option>
          <option value="H">H — 조직수준 활동</option>
          <option value="I">I — 인적자원관리 기초개념</option>
          <option value="J">J — 인적자원 조달</option>
          <option value="K">K — 인적자원 개발</option>
          <option value="L">L — 인적자원 평가와 보상</option>
          <option value="M">M — 인적자원 유지 및 방출</option>
          <option value="N">N — 생산운영관리 기초개념</option>
          <option value="O">O — 생산전략</option>
          <option value="P">P — 생산시스템 설계</option>
          <option value="Q">Q — 생산시스템 운영 및 통제</option>
          <option value="R">R — 마케팅 기초개념</option>
          <option value="S">S — 마케팅 기회분석</option>
          <option value="T">T — 마케팅 전략</option>
          <option value="U">U — 마케팅믹스</option>
          <option value="V">V — 마케팅 영역 확장</option>
          <option value="W">W — 재무관리</option>
          <option value="X">X — 회계학</option>
          <option value="Y">Y — 경영정보시스템</option>
        </select>
      </div>
    </div>

    <div class="grid3">
      <div class="field">
        <label>Prefix (2자리)</label>
        <input type="text" id="prefix" placeholder="예: AA" maxlength="3"
          oninput="syncFromPrefix()"
          style="font-family:'DM Mono',monospace; font-weight:500; letter-spacing:1px;">
        <div class="hint" id="prefixHint">알파벳 2자리 입력 (예: AA, DA, RA)</div>
      </div>
      <div class="field">
        <label>파일명 (자동생성)</label>
        <input type="text" id="filename" placeholder="unit_AA.js" readonly
          style="color:var(--muted); font-family:'DM Mono',monospace;">
      </div>
      <div class="field">
        <label>선택지 수</label>
        <select id="optCount">
          <option value="4" selected>4지선다 (①②③④)</option>
          <option value="5">5지선다 (①②③④⑤)</option>
        </select>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label>PDF 범위 (선택사항)</label>
      <input type="text" id="pdfRange" placeholder="예: p.22~p.58 / 전체 / 2단원 부분만">
    </div>
  </div>

  <button class="gen-btn" onclick="generate()">⚡ 프롬프트 생성</button>

  <div>
    <div class="output-header">
      <span class="output-label">생성된 프롬프트</span>
      <button class="copy-btn" id="copyBtn" onclick="copyPrompt()">📋 복사</button>
    </div>
    <div class="empty-state" id="emptyState">
      <div class="icon">📋</div>
      <p>단원 정보를 입력하고 생성 버튼을 눌러주세요</p>
    </div>
    <pre class="output-box" id="outputBox"></pre>
  </div>

</div>

<script>
var generatedText = '';

function updatePrefix() {
  var parent = document.getElementById('parentId').value;
  var prefixEl = document.getElementById('prefix');
  if (!prefixEl.value || prefixEl.value[0] !== parent) {
    prefixEl.value = parent;
  }
  syncFromPrefix();
}

function syncFromPrefix() {
  var prefix = document.getElementById('prefix').value.toUpperCase();
  document.getElementById('prefix').value = prefix;
  document.getElementById('filename').value = prefix ? 'unit_' + prefix + '.js' : '';
  var hint = document.getElementById('prefixHint');
  if (prefix.length === 2) {
    hint.textContent = '→ ID: ' + prefix + '01, ' + prefix + '02, ' + prefix + '03 ...';
    hint.className = 'hint green';
  } else {
    hint.textContent = '알파벳 2자리 입력 (예: AA, DA, RA)';
    hint.className = 'hint';
  }
}

function generate() {
  var unitName = document.getElementById('unitName').value.trim() || '○○○';
  var prefix = document.getElementById('prefix').value.toUpperCase();
  var filename = 'unit_' + prefix + '.js';
  var optCount = parseInt(document.getElementById('optCount').value);
  var pdfRange = document.getElementById('pdfRange').value.trim();

  if (!prefix || prefix.length < 2) {
    alert('Prefix를 2자리 알파벳으로 입력해주세요. (예: AA)');
    return;
  }

  var opts4 = "      '① 선택지 전체 원문',\n      '② 선택지 전체 원문',\n      '③ 선택지 전체 원문',\n      '④ 선택지 전체 원문'";
  var opts5 = "      '① 선택지 전체 원문',\n      '② 선택지 전체 원문',\n      '③ 선택지 전체 원문',\n      '④ 선택지 전체 원문',\n      '⑤ 선택지 전체 원문'";
  var exps4 = "      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'X', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'}";
  var exps5 = "      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'X', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'},\n      {ox: 'O', t: '해설 내용 (출처: 기출집 p.XX)'}";

  var selectedOpts = optCount === 5 ? opts5 : opts4;
  var selectedExps = optCount === 5 ? exps5 : exps4;
  var p = prefix;
  var rangeNote = pdfRange ? '\n   추출 범위: ' + pdfRange : '';

  generatedText =
'[첨부파일]\n' +
'- 경영학 기출문제집 ' + unitName + '.pdf\n' +
'\n' +
'위 PDF에서 문제를 추출해서 아래 형식의 JS 배열로만 출력해줘.\n' +
'JS 배열만 출력할 것 (단, stem 내 표는 HTML <table> 허용).\n' +
'\n' +
'⚠️ PDF에 있는 모든 문제를 빠짐없이 추출할 것.\n' +
'   임의로 문제를 선별·생략·요약하지 말 것.' + rangeNote + '\n' +
'   추출 후 PDF 페이지를 처음부터 끝까지 재확인하여 누락된 문제가 없는지 검수할 것.\n' +
'\n' +
'[단원 정보]\n' +
'- 단원명: ' + unitName + '\n' +
'- 파일명: ' + filename + '\n' +
'- 문제 ID prefix: ' + p + ' (' + p + '01, ' + p + '02, ' + p + '03 ...)\n' +
'\n' +
'[출력 형식 - 일반형]\n' +
'const UNIT_' + p + ' = [\n' +
'  {\n' +
'    id: \'' + p + '01\',   // X_TYPE (잘못된 것 고르기)\n' +
'    ans: 2,\n' +
'    stem: \'01. 문제 지문 전체...\',\n' +
'    opts: [\n' +
selectedOpts + '\n' +
'    ],\n' +
'    exps: [\n' +
selectedExps + '\n' +
'    ],\n' +
'    tip: \'💡 핵심 포인트 한 줄\'\n' +
'  },\n' +
'];\n' +
'\n' +
'[출력 형식 - 박스형 ㄱㄴㄷ]\n' +
'박스에 ㄱㄴㄷ 항목이 나열되고 opts가 "① ㄱ,ㄴ" 같은 조합형인 경우:\n' +
'→ opts는 ①②③④ 조합 선택지가 아니라 ㄱㄴㄷ 항목 원문을 가져올 것\n' +
'→ stem에는 질문 지문만, ㄱㄴㄷ 항목은 opts에 넣을 것\n' +
'→ ans는 정답 ①②③④ 번호\n' +
'\n' +
'예시:\n' +
'{\n' +
'  id: \'' + p + '05\',   // O_TYPE\n' +
'  ans: 1,\n' +
'  stem: \'05. 해당하는 것만을 모두 고른 것은?\',\n' +
'  opts: [\n' +
'    \'ㄱ. 항목 원문 전체\',\n' +
'    \'ㄴ. 항목 원문 전체\',\n' +
'    \'ㄷ. 항목 원문 전체\',\n' +
'    \'ㄹ. 항목 원문 전체\'\n' +
'  ],\n' +
'  exps: [\n' +
'    {ox: \'O\', t: \'ㄱ. 해설\'},\n' +
'    {ox: \'O\', t: \'ㄴ. 해설\'},\n' +
'    {ox: \'X\', t: \'ㄷ. 해설\'},\n' +
'    {ox: \'X\', t: \'ㄹ. 해설\'}\n' +
'  ],\n' +
'  tip: \'💡 핵심 포인트 한 줄\'\n' +
'}\n' +
'\n' +
'[표(table) 처리 규칙]\n' +
'문제에 표(보상표, 비용표, 비교표 등)가 있는 경우:\n' +
'→ stem 안에 아래 형식의 HTML 테이블로 변환하여 삽입\n' +
'→ 표는 stem 첫 줄(문제 지문) 뒤에 \\n 으로 구분해서 추가\n' +
'→ 속성은 class="q-table" 만 사용, 인라인 스타일 금지\n' +
'→ 따옴표는 반드시 \\" 로 이스케이프\n' +
'\n' +
'표 형식 예시 (단순 표):\n' +
'stem: \'01. 다음 보상표(payoff table)를 바탕으로 가장 옳은 것은?\\n<table class=\\"q-table\\"><tr><th>대안</th><th>E₁</th><th>E₂</th><th>E₃</th></tr><tr><td>D₁</td><td>20</td><td>20</td><td>20</td></tr><tr><td>D₂</td><td>-20</td><td>40</td><td>50</td></tr></table>\'\n' +
'\n' +
'표 형식 예시 (<보기 1> 표 + <보기 2> ㄱㄴㄷ 구조):\n' +
'→ <보기 1> 표는 stem 안에 caption으로 레이블 표시\n' +
'→ <보기 2> ㄱㄴㄷ 항목은 opts에\n' +
'stem: \'02. 질문 지문 <보기 1>과 같다. <보기 2>의 기준으로 모두 고른 것은?\\n<table class=\\"q-table\\"><caption>&lt;보기 1&gt;</caption><tr><th>구매 대안</th><th colspan=\\"2\\">수주 여부</th></tr><tr><td></td><th>수주 성공</th><th>수주 실패</th></tr><tr><td>A1</td><td>400</td><td>-10</td></tr></table>\'\n' +
'\n' +
'[규칙]\n' +
'1. 해설은 기출문제집 해설 원문만 사용, 외부 지식 추가 금지\n' +
'\n' +
'2. 문제 지문(stem)과 선택지(opts)는 PDF 원문을 절대 수정·축약하지 말고\n' +
'   띄어쓰기, 조사, 문장부호까지 100% 그대로 복사할 것\n' +
'   (단, [cite: 숫자] 표시만 제거)\n' +
'\n' +
'3. ox 값:\n' +
'   - X_TYPE: 정답 선택지만 ox:\'X\', 나머지는 ox:\'O\'\n' +
'   - O_TYPE: 정답 선택지만 ox:\'O\', 나머지는 ox:\'X\'\n' +
'   - 박스형: ㄱㄴㄷ 각 항목이 옳으면 ox:\'O\', 틀리면 ox:\'X\'\n' +
'\n' +
'4. 문제 유형 주석:\n' +
'   - "옳지 않은/잘못된/틀린 것" → // X_TYPE\n' +
'   - "옳은/올바른/해당하는 것만 모두" → // O_TYPE\n' +
'\n' +
'5. [cite: 숫자] 표시 모두 제거\n' +
'\n' +
'6. 문자열 안 따옴표는 \\\' 로 이스케이프\n' +
'\n' +
'7. tip은 PDF에 없으면 핵심 개념 한 줄 요약\n' +
'\n' +
'[완료 후 알려줄 것]\n' +
'- 총 추출 문제 수\n' +
'- O_TYPE 문제 ID 목록 (나중에 O_TYPE Set에 추가할 것임)\n' +
'- 박스형으로 처리한 문제 ID 목록\n' +
'- 추출 중 애매했던 부분\n' +
'- stem·opts가 축약된 문제 있으면 별도 표시';

  var box = document.getElementById('outputBox');
  var empty = document.getElementById('emptyState');
  box.textContent = generatedText;
  box.classList.add('visible');
  empty.style.display = 'none';
}

function copyPrompt() {
  if (!generatedText) return;
  navigator.clipboard.writeText(generatedText).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 복사됨!';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = '📋 복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}

updatePrefix();
